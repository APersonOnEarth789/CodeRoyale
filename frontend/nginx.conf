server {
    listen 80;
    server_name localhost;
 
    root /usr/share/nginx/html;
    index index.html;
 
    # ── SPA fallback ────────────────────────────────────────────────────────
    # Without this, refreshing on any route other than "/" returns a 404.
    # try_files checks for a real file/directory first, then falls back to
    # index.html so React Router can handle the path client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # ── Static asset caching ─────────────────────────────────────────────────
    # Vite fingerprints JS/CSS filenames (e.g. main.a1b2c3.js) so it's safe
    # to cache them for a long time. index.html itself must NOT be cached so
    # users always get the latest asset filenames on deploy.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
 
    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
}
 